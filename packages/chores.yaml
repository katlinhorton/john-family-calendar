# =============================================================================
# GROCY CHORES PACKAGE - VERSION 3 (FIXED)
# =============================================================================
# Save to: /config/packages/grocy_chores.yaml
#
# FIXED: Using correct Grocy field names:
#   - id (not chore_id)
#   - name (not chore_name)
#   - description (contains points like "3 points")
# =============================================================================

# -----------------------------------------------------------------------------
# TEMPLATE SENSORS - Filter chores by person AND by due date
# -----------------------------------------------------------------------------
# Grocy User IDs:
#   User 2 = Buck (Curtis)
#   User 3 = Kat (Katlin)
#   User 4 = Jacob
#   User 5 = Connor
# -----------------------------------------------------------------------------

template:
  - sensor:
      # KAT (user_id: 3)
      - name: "Kat Chores Today"
        unique_id: kat_chores_today
        state: >
          {% set chores = state_attr('sensor.grocy_chores', 'chores') | default([]) %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set ns = namespace(count=0) %}
          {% for chore in chores %}
            {% if chore.next_execution_assigned_to_user_id == 3 %}
              {% set exec_date = chore.next_estimated_execution_time | default('') %}
              {% if exec_date and exec_date[:10] <= today %}
                {% set ns.count = ns.count + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
        attributes:
          chores: >
            {% set chores = state_attr('sensor.grocy_chores', 'chores') | default([]) %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set ns = namespace(result=[]) %}
            {% for chore in chores %}
              {% if chore.next_execution_assigned_to_user_id == 3 %}
                {% set exec_date = chore.next_estimated_execution_time | default('') %}
                {% if exec_date and exec_date[:10] <= today %}
                  {% set points = chore.description | default('0') | regex_findall('\\d+') %}
                  {% set point_val = points[0] | int if points else 0 %}
                  {% set ns.result = ns.result + [{'id': chore.id, 'name': chore.name, 'points': point_val}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.result }}
          chore_options: >
            {% set chores = state_attr('sensor.grocy_chores', 'chores') | default([]) %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set ns = namespace(options=['No chores']) %}
            {% for chore in chores %}
              {% if chore.next_execution_assigned_to_user_id == 3 %}
                {% set exec_date = chore.next_estimated_execution_time | default('') %}
                {% if exec_date and exec_date[:10] <= today %}
                  {% set points = chore.description | default('0') | regex_findall('\\d+') %}
                  {% set point_val = points[0] | int if points else 0 %}
                  {% set ns.options = ns.options + [chore.name ~ ' (' ~ point_val ~ ' pts) [ID:' ~ chore.id ~ ']'] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.options }}

