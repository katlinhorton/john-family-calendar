                  {% set chores = state_attr('sensor.connor_chores_today', 'chores') | default([]) %}
                  {% if chores | length == 0 %}
                  ### ✅ No chores to complete!
                  {% else %}
                  ### Select chore from dropdown, then tap Complete:
                  {% endif %}
              - type: entities
                entities:
                  - entity: input_select.connor_chore_select
                    name: Select Chore
              - type: custom:button-card
                name: ✓ Mark Complete
                icon: mdi:check-bold
                tap_action:
                  action: call-service
                  service: script.complete_connor_chore_from_select
                styles:
                  card:
                    - background: var(--connor-default-primary-color)
                    - border-radius: 8px
                    - padding: 12px
                  icon:
                    - color: white
                  name:
                    - color: white
                    - font-size: 1.2em
  - type: sidebar
    path: ''
    icon: mdi:basket
    cards: []
  - type: sidebar
    path: ''
    icon: mdi:food
    cards: []
