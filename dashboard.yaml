views:
  - type: sections
    max_columns: 10
    title: Family Calendar
    path: family-calendar
    sections:
      - type: grid
        cards:
          - type: custom:better-moment-card
            parentStyle: |
              line-height:normal;
            moment:
              - parentStyle: |
                  font-size:1em; text-align:center; margin-top:5px;
                templateRaw: |
                  {{moment format=cccc}}
              - parentStyle: |
                  font-size:1.5em; text-align:center; margin-top:5px;
                templateRaw: |
                  {{moment format=LLLL dd, yyyy}}              
              - parentStyle: |
                  font-size:4em;  text-align:center; font-weight:400;
                templateRaw: |
                  {{moment format=HH:mm}} 
            grid_options:
              columns: 20
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
          - type: custom:weather-card
            entity: weather.openweathermap
            show_current: true
            details: true
            show_forecast: false
            grid_options:
              columns: 20
              rows: 3
          - type: weather-forecast
            show_current: false
            show_forecast: true
            entity: weather.107_courtney_springs_2
            forecast_type: hourly
            forecast_slots: 5
            name: Weather Forecast
            grid_options:
              columns: 20
              rows: 3
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
        column_span: 10
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: ' '
                card_mod:
                  style: >
                    ha-card { background: none; box-shadow: none; border: none;
                    }
                grid_options:
                  columns: 18
                  rows: auto
            grid_options:
              columns: 120
              rows: auto
          - type: vertical-stack
            cards:
              - type: markdown
                content: <font color="Black" size="6">Family Calendar</font>
                grid_options:
                  columns: 18
                  rows: auto
            grid_options:
              columns: 120
              rows: auto
          - type: horizontal-stack
            cards:
              - type: custom:bubble-card
                card_type: button
                button_type: state
                entity: person.katlin_john
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.kat_calendar_visible_filter
                styles: |
                  .bubble-button-background {
                    opacity: 1 !important;
                    background-color: ${hass.states['input_text.kat_calendar_filter'].state === '.*' ? 'light-grey' : 'var(--kat-default-primary-color)'} !important;
                  }
              - type: custom:bubble-card
                card_type: button
                button_type: state
                entity: person.curtis_john
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.buck_calendar_visible_filter
                styles: |
                  .bubble-button-background {
                    opacity: 1 !important;
                    background-color: ${hass.states['input_text.buck_calendar_filter'].state === '.*' ? 'light-grey' : 'var(--buck-default-primary-color)'} !important;
                  }
              - type: custom:bubble-card
                card_type: button
                button_type: state
                entity: person.jacob_hogan
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.jacob_calendar_visible_filter
                styles: |
                  .bubble-button-background {
                    opacity: 1 !important;
                    background-color: ${hass.states['input_text.jacob_calendar_filter'].state === '.*' ? 'light-grey' : 'var(--jacob-default-primary-color)'} !important;
                  }
              - type: custom:bubble-card
                card_type: button
                button_type: state
                entity: person.connor_john
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.connor_calendar_visible_filter
                styles: |
                  .bubble-button-background {
                    opacity: 1 !important;
                    background-color: ${hass.states['input_text.connor_calendar_filter'].state === '.*' ? 'light-grey' : 'var(--connor-default-primary-color)'} !important;
                  }
              - type: custom:bubble-card
                card_type: button
                button_type: switch
                name: Family
                icon: mdi:human-male-female-child
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.family_calendar_visible_filter
                styles: |
                  .bubble-button-background {
                    opacity: 1 !important;
                    background-color: ${hass.states['input_text.family_calendar_filter'].state === '.*' ? 'light-grey' : '#4A90E2'} !important;
                  }
                entity: input_boolean.family_calendar_show
              - type: custom:bubble-card
                card_type: button
                button_type: name
                name: Birthdays
                icon: mdi:cake-variant
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.birthdays_calendar_visible_filter
