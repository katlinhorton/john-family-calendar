            {% set chores = state_attr('sensor.grocy_chores', 'chores') | default([]) %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% set ns = namespace(result=[]) %}
            {% for chore in chores %}
              {% if chore.next_execution_assigned_to_user_id == 2 %}
                {% set exec_date = chore.next_estimated_execution_time | default('') %}
                {% if exec_date and exec_date[:10] <= today %}
