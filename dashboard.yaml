                      .day .date .text { font-size: 1em !important; font-weight: bold !important; }
                      .day .date .number { font-weight: bold !important; font-size: 3em !important; }
                      .day { border: solid 1px whitesmoke; padding: 0.2%; width: 13% !important; }
                    }
            grid_options:
              columns: 120
              rows: 1
        column_span: 10
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: '#addcalendarevent'
                button_type: name
                name: Add Calendar Event
                icon: mdi:calendar-plus
                show_icon: true
                show_name: true
                styles: |
                  .bubble-button-card-container {
                    background: 
                    ${hass.states['input_select.calendar_select'].state == 'Kat' ? 'var(--kat-default-primary-color)' 
                    : hass.states['input_select.calendar_select'].state == 'Buck' ? 'var(--buck-default-primary-color)' 
                    : hass.states['input_select.calendar_select'].state == 'Jacob' ? 'var(--jacob-default-primary-color)' 
                    : hass.states['input_select.calendar_select'].state == 'Connor' ? 'var(--connor-default-primary-color)' 
                    : hass.states['input_select.calendar_select'].state == 'Family' ? 'var(--family-default-primary-color)' 
                    : 'gray'} !important;
                  }
              - type: vertical-stack
                cards:
                  - type: entities
                    entities:
                      - entity: input_select.calendar_select
                      - entity: input_text.calendar_event_title
                        name: Event Title
                      - entity: input_text.calendar_event_description
                        name: Event Description
                      - entity: input_boolean.calendar_all_day_event
                        name: All Day Event
                    title: Add Calendar Event
                    state_color: false
                  - type: conditional
                    conditions:
                      - entity: input_boolean.calendar_all_day_event
                        state: 'off'
                    card:
                      type: entities
                      entities:
                        - entity: input_datetime.calendar_event_start
                          name: Start Time
                        - entity: input_datetime.calendar_event_end
                          name: End Time
                  - type: conditional
                    conditions:
                      - entity: input_boolean.calendar_all_day_event
                        state: 'on'
                    card:
                      type: entities
                      entities:
                        - entity: input_datetime.calendar_day_event_start
                          name: Event Start Date
                        - entity: input_datetime.calendar_day_event_end
                          name: Event End Date
                  - type: custom:button-card
                    name: Add Event to Calendar
                    tap_action:
                      action: call-service
                      service: script.add_google_calendar_event
                    styles:
                      card:
                        - background-color: |
                            [[[
                              if (states['input_select.calendar_select'].state == 'Kat') return "var(--kat-default-primary-color)";
                              if (states['input_select.calendar_select'].state == 'Buck') return "var(--buck-default-primary-color)";
                              if (states['input_select.calendar_select'].state == 'Jacob') return "var(--jacob-default-primary-color)";
                              if (states['input_select.calendar_select'].state == 'Connor') return "var(--connor-default-primary-color)";
                              if (states['input_select.calendar_select'].state == 'Family') return "var(--family-default-primary-color)";
                              return "gray";
                            ]]]                
    cards: []
