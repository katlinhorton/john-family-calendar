# ==============================================================================
#  FAMILY CALENDAR BACKEND PACKAGE
# ==============================================================================
#  INSTRUCTIONS:
#  1. Place this file in your /config/packages/ folder.
#  2. Ensure your configuration.yaml has:
#     homeassistant:
#       packages: !include_dir_named packages
#  3. RESTART Home Assistant.
# ==============================================================================

# 1. HELPERS (The Variables)
input_text:
  # Filter Toggles (RegEx: .* = Show, ^$ = Hide)
  # __LOOP_PERSONS_START__
  person1_calendar_filter:
    name: Person1 Filter
    initial: ".*"
  # __LOOP_PERSONS_END__
  family_calendar_filter:
    name: Family Filter
    initial: ".*"
  sports_calendar_filter:
    name: Sports Filter
    initial: ".*"
  holidays_calendar_filter:
    name: Holidays Filter
    initial: ".*"

  # Event Form Data
  calendar_event_title:
    name: Event Title
    icon: mdi:format-title
  calendar_event_description:
    name: Event Description
    icon: mdi:text

input_select:
  # The dropdown list for "Who is this event for?"
  calendar_select:
    name: Select Calendar
    options:
      # __LOOP_PERSONS_START__
      - Person1
      # __LOOP_PERSONS_END__
      - Family
    icon: mdi:calendar-check

  # The View selector (Week, Month, etc)
  calendar_view:
    name: Calendar View
    options:
      - Today
      - Tomorrow
      - Week
      - Month
    initial: Week

input_datetime:
  # Event start/end times
  calendar_event_start:
    has_date: true
    has_time: true
  calendar_event_end:
    has_date: true
    has_time: true
  calendar_day_event_start:
    has_date: true
    has_time: false
  calendar_day_event_end:
    has_date: true
    has_time: false

input_boolean:
  # UI Toggles
  calendar_all_day_event:
    name: All Day Event
    icon: mdi:calendar-clock
  family_calendar_show:
    name: Show Family Calendar

input_number:
  # Week view navigation offset (in weeks)
  week_view_offset:
    name: Week View Offset
    min: -52
    max: 52
    step: 1
    initial: 0
    mode: box
    icon: mdi:calendar-week

  # Month view navigation offset (in months)
  month_view_offset:
    name: Month View Offset
    min: -12
    max: 12
    step: 1
    initial: 0
    mode: box
    icon: mdi:calendar-month

# 2. SCRIPTS (The Logic)
script:
  # --- Week Navigation ---
  week_view_previous:
    alias: Previous Week
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.week_view_offset
        data:
          value: "{{ states('input_number.week_view_offset') | int - 1 }}"

  week_view_next:
    alias: Next Week
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.week_view_offset
        data:
          value: "{{ states('input_number.week_view_offset') | int + 1 }}"

  week_view_today:
    alias: Week View Today
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.week_view_offset
        data:
          value: 0

  # --- Month Navigation ---
  month_view_previous:
    alias: Previous Month
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.month_view_offset
        data:
          value: "{{ states('input_number.month_view_offset') | int - 1 }}"

  month_view_next:
    alias: Next Month
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.month_view_offset
        data:
          value: "{{ states('input_number.month_view_offset') | int + 1 }}"

  month_view_today:
    alias: Month View Today
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.month_view_offset
        data:
          value: 0

  # --- Filter Toggles ---
  # __LOOP_PERSONS_START__
  person1_calendar_visible_filter:
    alias: Toggle Person1 Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.person1_calendar_filter
        data:
          value: >
            {% if is_state('input_text.person1_calendar_filter', '.*') %} ^$ {% else %} .* {% endif %}
  # __LOOP_PERSONS_END__

  family_calendar_visible_filter:
    alias: Toggle Family Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.family_calendar_filter
        data:
          value: >
            {% if is_state('input_text.family_calendar_filter', '.*') %} ^$ {% else %} .* {% endif %}

  sports_calendar_visible_filter:
    alias: Toggle Sports Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.sports_calendar_filter
        data:
          value: >
            {% if is_state('input_text.sports_calendar_filter', '.*') %} ^$ {% else %} .* {% endif %}

  holidays_calendar_visible_filter:
    alias: Toggle Holidays Calendar
    sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.holidays_calendar_filter
        data:
          value: >
            {% if is_state('input_text.holidays_calendar_filter', '.*') %} ^$ {% else %} .* {% endif %}

  # --- Add Event Logic ---
  add_google_calendar_event:
    alias: Process Add Calendar Event
    sequence:
      - variables:
          # ====================================================================
          # CONFIGURATION: ENTITY MAPPING
          # Map the Dropdown Name (Left) to your Entity ID (Right).
          # ====================================================================
          calendar_map:
            # __LOOP_PERSONS_START__
            "Person1": "__CAL_1__"
            # __LOOP_PERSONS_END__
            "Family": "__CAL_FAMILY_ADD__"

          # Selects the entity based on the map above
          target_calendar: "{{ calendar_map.get(states('input_select.calendar_select'), '__CAL_FAMILY_ADD__') }}"

      - choose:
          # Scenario A: All Day Event
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "on"
            sequence:
              - action: calendar.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  start_date: "{{ states('input_datetime.calendar_day_event_start') }}"
                  end_date: "{{ states('input_datetime.calendar_day_event_end') }}"

          # Scenario B: Timed Event
          - conditions:
              - condition: state
                entity_id: input_boolean.calendar_all_day_event
                state: "off"
            sequence:
              - action: calendar.create_event
                target:
                  entity_id: "{{ target_calendar }}"
                data:
                  summary: "{{ states('input_text.calendar_event_title') }}"
                  description: "{{ states('input_text.calendar_event_description') }}"
                  start_date_time: "{{ states('input_datetime.calendar_event_start') }}"
                  end_date_time: "{{ states('input_datetime.calendar_event_end') }}"

      # Cleanup and Close
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_title
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.calendar_event_description
        data:
          value: ""
      - action: browser_mod.close_popup
        data: {}
