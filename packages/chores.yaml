# =============================================================================
# GROCY CHORES PACKAGE
# =============================================================================
# Save to: /config/packages/grocy_chores.yaml
#
# Uses the existing sensor.grocy_chores from Grocy integration
#
# User IDs:
#   2 = Buck (Curtis)
#   3 = Kat
#   4 = Jacob
#   5 = Connor
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT BOOLEAN
# -----------------------------------------------------------------------------

input_boolean:
  jacob_home_today:
    name: Jacob Home Today
    icon: mdi:home-account

# -----------------------------------------------------------------------------
# INPUT TEXT - Track completed chores per person (resets daily)
# -----------------------------------------------------------------------------

input_text:
  kat_completed_chores:
    name: Kat Completed Chores
    initial: ""
    max: 255

  buck_completed_chores:
    name: Buck Completed Chores
    initial: ""
    max: 255

  jacob_completed_chores:
    name: Jacob Completed Chores
    initial: ""
    max: 255

  connor_completed_chores:
    name: Connor Completed Chores
    initial: ""
    max: 255

# -----------------------------------------------------------------------------
# INPUT NUMBERS - Point tracking
# -----------------------------------------------------------------------------

input_number:
  kat_weekly_points:
    name: Kat Weekly Points
    min: 0
    max: 1000
    step: 1
    mode: box

  kat_monthly_points:
    name: Kat Monthly Points
    min: 0
    max: 5000
    step: 1
    mode: box

  buck_weekly_points:
    name: Buck Weekly Points
    min: 0
    max: 1000
    step: 1
    mode: box

  buck_monthly_points:
    name: Buck Monthly Points
    min: 0
    max: 5000
    step: 1
    mode: box

  jacob_weekly_points:
    name: Jacob Weekly Points
    min: 0
    max: 1000
    step: 1
    mode: box

  jacob_monthly_points:
    name: Jacob Monthly Points
    min: 0
    max: 5000
    step: 1
    mode: box

  connor_weekly_points:
    name: Connor Weekly Points
    min: 0
    max: 1000
    step: 1
    mode: box

  connor_monthly_points:
    name: Connor Monthly Points
    min: 0
    max: 5000
    step: 1
    mode: box

# -----------------------------------------------------------------------------
# TEMPLATE SENSORS - Per-person chore lists
# -----------------------------------------------------------------------------

template:
  - sensor:
      # KAT (user_id: 3)
      - name: "Kat Chores Today"
        unique_id: kat_chores_today
        state: >
          {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
          {% set dow = now().strftime('%A') | lower %}
          {% set completed = states('input_text.kat_completed_chores') | default('') %}
          {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
          {% set ns = namespace(count=0) %}
          {% for chore in chores %}
            {% set assigned = (chore.assignment_config | default('')) | string %}
            {% if '3' in assigned.split(',') | map('trim') | list %}
              {% set period = chore.period_type | default('') %}
              {% set config = (chore.period_config | default('')) | string | lower %}
              {% set show = false %}
              {% if period == 'daily' %}{% set show = true %}{% endif %}
              {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
              {% if show and (chore.id | string) not in completed_ids %}
                {% set ns.count = ns.count + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
        attributes:
          chores: >
            {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
            {% set dow = now().strftime('%A') | lower %}
            {% set completed = states('input_text.kat_completed_chores') | default('') %}
            {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
            {% set ns = namespace(result=[]) %}
            {% for chore in chores %}
              {% set assigned = (chore.assignment_config | default('')) | string %}
              {% if '3' in assigned.split(',') | map('trim') | list %}
                {% set period = chore.period_type | default('') %}
                {% set config = (chore.period_config | default('')) | string | lower %}
                {% set show = false %}
                {% if period == 'daily' %}{% set show = true %}{% endif %}
                {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
                {% if show %}
                  {% set desc = chore.description | default('0') %}
                  {% set points = desc | regex_findall('\\d+') %}
                  {% set point_val = points[0] | int(0) if points else 0 %}
                  {% set is_done = (chore.id | string) in completed_ids %}
                  {% set ns.result = ns.result + [{"id": chore.id, "name": chore.name, "points": point_val, "done": is_done}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.result | to_json }}

      # BUCK (user_id: 2)
      - name: "Buck Chores Today"
        unique_id: buck_chores_today
        state: >
          {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
          {% set dow = now().strftime('%A') | lower %}
          {% set completed = states('input_text.buck_completed_chores') | default('') %}
          {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
          {% set ns = namespace(count=0) %}
          {% for chore in chores %}
            {% set assigned = (chore.assignment_config | default('')) | string %}
            {% if '2' in assigned.split(',') | map('trim') | list %}
              {% set period = chore.period_type | default('') %}
              {% set config = (chore.period_config | default('')) | string | lower %}
              {% set show = false %}
              {% if period == 'daily' %}{% set show = true %}{% endif %}
              {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
              {% if show and (chore.id | string) not in completed_ids %}
                {% set ns.count = ns.count + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
        attributes:
          chores: >
            {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
            {% set dow = now().strftime('%A') | lower %}
            {% set completed = states('input_text.buck_completed_chores') | default('') %}
            {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
            {% set ns = namespace(result=[]) %}
            {% for chore in chores %}
              {% set assigned = (chore.assignment_config | default('')) | string %}
              {% if '2' in assigned.split(',') | map('trim') | list %}
                {% set period = chore.period_type | default('') %}
                {% set config = (chore.period_config | default('')) | string | lower %}
                {% set show = false %}
                {% if period == 'daily' %}{% set show = true %}{% endif %}
                {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
                {% if show %}
                  {% set desc = chore.description | default('0') %}
                  {% set points = desc | regex_findall('\\d+') %}
                  {% set point_val = points[0] | int(0) if points else 0 %}
                  {% set is_done = (chore.id | string) in completed_ids %}
                  {% set ns.result = ns.result + [{"id": chore.id, "name": chore.name, "points": point_val, "done": is_done}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.result | to_json }}

      # JACOB (user_id: 4)
      - name: "Jacob Chores Today"
        unique_id: jacob_chores_today
        state: >
          {% if is_state('input_boolean.jacob_home_today', 'off') %}
            0
          {% else %}
            {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
            {% set dow = now().strftime('%A') | lower %}
            {% set completed = states('input_text.jacob_completed_chores') | default('') %}
            {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
            {% set ns = namespace(count=0) %}
            {% for chore in chores %}
              {% set assigned = (chore.assignment_config | default('')) | string %}
              {% if '4' in assigned.split(',') | map('trim') | list %}
                {% set period = chore.period_type | default('') %}
                {% set config = (chore.period_config | default('')) | string | lower %}
                {% set show = false %}
                {% if period == 'daily' %}{% set show = true %}{% endif %}
                {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
                {% if show and (chore.id | string) not in completed_ids %}
                  {% set ns.count = ns.count + 1 %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.count }}
          {% endif %}
        attributes:
          jacob_home: "{{ is_state('input_boolean.jacob_home_today', 'on') }}"
          chores: >
            {% if is_state('input_boolean.jacob_home_today', 'off') %}
              []
            {% else %}
              {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
              {% set dow = now().strftime('%A') | lower %}
              {% set completed = states('input_text.jacob_completed_chores') | default('') %}
              {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
              {% set ns = namespace(result=[]) %}
              {% for chore in chores %}
                {% set assigned = (chore.assignment_config | default('')) | string %}
                {% if '4' in assigned.split(',') | map('trim') | list %}
                  {% set period = chore.period_type | default('') %}
                  {% set config = (chore.period_config | default('')) | string | lower %}
                  {% set show = false %}
                  {% if period == 'daily' %}{% set show = true %}{% endif %}
                  {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
                  {% if show %}
                    {% set desc = chore.description | default('0') %}
                    {% set points = desc | regex_findall('\\d+') %}
                    {% set point_val = points[0] | int(0) if points else 0 %}
                    {% set is_done = (chore.id | string) in completed_ids %}
                    {% set ns.result = ns.result + [{"id": chore.id, "name": chore.name, "points": point_val, "done": is_done}] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.result | to_json }}
            {% endif %}

      # CONNOR (user_id: 5)
      - name: "Connor Chores Today"
        unique_id: connor_chores_today
        state: >
          {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
          {% set dow = now().strftime('%A') | lower %}
          {% set completed = states('input_text.connor_completed_chores') | default('') %}
          {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
          {% set ns = namespace(count=0) %}
          {% for chore in chores %}
            {% set assigned = (chore.assignment_config | default('')) | string %}
            {% if '5' in assigned.split(',') | map('trim') | list %}
              {% set period = chore.period_type | default('') %}
              {% set config = (chore.period_config | default('')) | string | lower %}
              {% set show = false %}
              {% if period == 'daily' %}{% set show = true %}{% endif %}
              {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
              {% if show and (chore.id | string) not in completed_ids %}
                {% set ns.count = ns.count + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}
        attributes:
          chores: >
            {% set chores = state_attr('sensor.grocy_chores', 'chores') or [] %}
            {% set dow = now().strftime('%A') | lower %}
            {% set completed = states('input_text.connor_completed_chores') | default('') %}
            {% set completed_ids = completed.split(',') | map('trim') | list if completed else [] %}
            {% set ns = namespace(result=[]) %}
            {% for chore in chores %}
              {% set assigned = (chore.assignment_config | default('')) | string %}
              {% if '5' in assigned.split(',') | map('trim') | list %}
                {% set period = chore.period_type | default('') %}
                {% set config = (chore.period_config | default('')) | string | lower %}
                {% set show = false %}
                {% if period == 'daily' %}{% set show = true %}{% endif %}
                {% if period == 'weekly' and dow in config %}{% set show = true %}{% endif %}
                {% if show %}
                  {% set desc = chore.description | default('0') %}
                  {% set points = desc | regex_findall('\\d+') %}
                  {% set point_val = points[0] | int(0) if points else 0 %}
                  {% set is_done = (chore.id | string) in completed_ids %}
                  {% set ns.result = ns.result + [{"id": chore.id, "name": chore.name, "points": point_val, "done": is_done}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.result | to_json }}

# -----------------------------------------------------------------------------
# SCRIPTS
# -----------------------------------------------------------------------------

script:
  complete_chore:
    alias: Toggle Chore Completion
    mode: queued
    fields:
      chore_id:
        description: The chore ID
      person:
        description: Person name (kat, buck, jacob, connor)
      points:
        description: Points to award/remove
    sequence:
      - variables:
          input_entity: "input_text.{{ person }}_completed_chores"
          weekly_entity: "input_number.{{ person }}_weekly_points"
          monthly_entity: "input_number.{{ person }}_monthly_points"
          points_val: "{{ points | int(0) }}"
      - variables:
          current_text: "{{ states(input_entity) | default('', true) | string }}"
      - variables:
          completed_list: "{{ current_text.split(',') | map('trim') | reject('eq', '') | list }}"
          chore_str: "{{ chore_id | string }}"
      - variables:
          already_done: "{{ chore_str in completed_list }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ already_done }}"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: "{{ input_entity }}"
                data:
                  value: "{{ completed_list | reject('eq', chore_str) | join(',') }}"
              - service: input_number.set_value
                target:
                  entity_id: "{{ weekly_entity }}"
                data:
                  value: "{{ [states(weekly_entity) | int(0) - points_val, 0] | max }}"
              - service: input_number.set_value
                target:
                  entity_id: "{{ monthly_entity }}"
                data:
                  value: "{{ [states(monthly_entity) | int(0) - points_val, 0] | max }}"
        default:
          - service: input_text.set_value
            target:
              entity_id: "{{ input_entity }}"
            data:
              value: "{{ (completed_list + [chore_str]) | join(',') }}"
          - service: input_number.set_value
            target:
              entity_id: "{{ weekly_entity }}"
            data:
              value: "{{ states(weekly_entity) | int(0) + points_val }}"
          - service: input_number.set_value
            target:
              entity_id: "{{ monthly_entity }}"
            data:
              value: "{{ states(monthly_entity) | int(0) + points_val }}"

# -----------------------------------------------------------------------------
# AUTOMATIONS
# -----------------------------------------------------------------------------

automation:
  - alias: "Chores: Reset Daily"
    id: chores_reset_daily
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      - service: input_text.set_value
        target:
          entity_id:
            - input_text.kat_completed_chores
            - input_text.buck_completed_chores
            - input_text.jacob_completed_chores
            - input_text.connor_completed_chores
        data:
          value: ""

  - alias: "Chores: Reset Weekly Points"
    id: chores_reset_weekly
    trigger:
      - platform: time
        at: "00:00:00"
    condition:
      - condition: time
        weekday:
          - sun
    action:
      - service: input_number.set_value
        target:
          entity_id:
            - input_number.kat_weekly_points
            - input_number.buck_weekly_points
            - input_number.jacob_weekly_points
            - input_number.connor_weekly_points
        data:
          value: 0

  - alias: "Chores: Reset Monthly Points"
    id: chores_reset_monthly
    trigger:
      - platform: time
        at: "00:00:00"
    condition:
      - condition: template
        value_template: "{{ now().day == 1 }}"
    action:
      - service: input_number.set_value
        target:
          entity_id:
            - input_number.kat_monthly_points
            - input_number.buck_monthly_points
            - input_number.jacob_monthly_points
            - input_number.connor_monthly_points
        data:
          value: 0

  - alias: "Chores: Check Jacob Presence"
    id: chores_jacob_presence
    trigger:
      - platform: time
        at: "00:00:00"
      - platform: homeassistant
        event: start
    action:
      - if:
          - condition: state
            entity_id: person.jacob_hogan
            state: "home"
        then:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.jacob_home_today
        else:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.jacob_home_today