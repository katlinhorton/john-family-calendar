                        name: Buck
                        filter: ${ BUCCAL }
                      - entity: calendar.jacobhogan91_gmail_com
                        name: Jacob
                        color: var(--jacob-default-primary-color)
                        filter: ${ JACCAL }
                      - entity: calendar.connor
                        name: Connor
                        color: var(--connor-default-primary-color)
                        filter: ${ CONCAL }
                      - entity: calendar.friend_events
                        name: Family
                        color: var(--family-default-primary-color)
                        filter: ${ FAMCAL }
                      - entity: calendar.family_calendar
                        name: Family
                        color: var(--family-default-primary-color)
                        filter: ${ FAMCAL }
                      - entity: >-
                          calendar.https_www_seahawks_com_api_addtocalendar_ag_d_text_seattle_seahawks_games
                        name: Sports
                        color: var(--sports-default-primary-color)
                        filter: ${ SPOCAL }
                      - entity: calendar.united_states_va
                        name: Holidays
                        color: var(--holidays-default-primary-color)
                        filter: ${ HOLCAL }
                    days: ${ MONTH_DAYS }
                    texts:
                      noEvents: ''
                    startingDayOffset: ${ MONTH_OFFSET }
                    showWeekDayText: false
                    hideWeekend: false
                    noCardBackground: false
                    compact: false
                    locale: en
                    showLocation: false
                    hidePastEvents: false
                    hideDaysWithoutEvents: false
                    hideTodayWithoutEvents: false
                    combineSimilarEvents: true
                    showLegend: false
                    legendToggle: false
                    card_mod:
                      style: |
                        ha-card {
                          background: rgba(255, 255, 255, 0.6) !important;
                          border-radius: 24px;
                          box-shadow: none;
                          .event.past { opacity: .2; background-color: gray !important; }
                          .time { color: #333333 !important; font-size: 0.8em !important; }
                          .event { color: #333333 !important; line-height: 16px !important; background-color: var(--border-color) !important; border-radius: 10px !important; max-height: 80px !important; overflow: hidden !important; font-size: 1.1em !important; }
                          .none { background-color: transparent !important; }
                          .today .number { border-radius: 5px; background-color: orange !important; padding-left: 4px; padding-right: 4px; }
                          .day .date .text { display: none !important; }
                          .day .date .number { font-weight: bold !important; font-size: 3em !important; }
                          .day { border: solid 1px whitesmoke; padding: 0.2%; width: 13% !important; }
                          .container { width: 100% !important; justify-content: space-between !important; }
                        }
            grid_options:
              columns: 120
              rows: 1
        column_span: 10
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
