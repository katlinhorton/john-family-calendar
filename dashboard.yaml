views:
  - type: sections
    max_columns: 10
    path: family-calendar
    sections:
      - type: grid
        cards:
          - type: custom:weather-card
            entity: weather.openweathermap
            show_current: true
            details: true
            show_forecast: false
            grid_options:
              columns: 28
              rows: 3
          - type: custom:better-moment-card
            parentStyle: |
              line-height:normal;
            moment:
              - parentStyle: |
                  font-size:1em; text-align:center; margin-top:5px;
                templateRaw: |
                  {{moment format=cccc}}
              - parentStyle: |
                  font-size:1.5em; text-align:center; margin-top:5px;
                templateRaw: |
                  {{moment format=LLLL dd, yyyy}}
              - parentStyle: |
                  font-size:4em;  text-align:center; font-weight:400;
                templateRaw: |
                  {{moment format=HH:mm}}
            grid_options:
              columns: 25
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
          - show_current: false
            show_forecast: true
            type: weather-forecast
            entity: weather.107_courtney_springs_2
            forecast_type: hourly
            name: Weather Forecast
            grid_options:
              columns: 31
              rows: 3
            forecast_slots: 6
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
        column_span: 10
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: ' '
                card_mod:
                  style: >
                    ha-card { background: none; box-shadow: none; border: none;
                    }
                grid_options:
                  columns: 18
                  rows: auto
            grid_options:
              columns: 120
              rows: auto
          - type: custom:bubble-card
            card_type: select
            entity: input_select.calendar_view
            show_name: true
            show_state: true
            name: Select View
            show_last_changed: false
            show_attribute: false
          - type: horizontal-stack
            cards:
              - type: custom:bubble-card
                card_type: button
                button_type: state
                entity: person.katlin_john
                show_icon: true
                show_name: true
                tap_action:
                  action: perform-action
                  perform_action: script.kat_calendar_visible_filter
