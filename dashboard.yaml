                - type: custom:config-template-card
                  entities:
                    - input_text.kat_calendar_filter
                    - input_text.buck_calendar_filter
                    - input_text.jacob_calendar_filter
                    - input_text.connor_calendar_filter
                    - input_text.family_calendar_filter
                    - input_text.holidays_calendar_filter
                    - input_text.sports_calendar_filter
                    - input_number.month_view_offset
                  variables:
                    KATCAL: states['input_text.kat_calendar_filter']?.state
                    BUCCAL: states['input_text.buck_calendar_filter']?.state
                    JACCAL: states['input_text.jacob_calendar_filter']?.state
                    CONCAL: states['input_text.connor_calendar_filter']?.state
                    FAMCAL: states['input_text.family_calendar_filter']?.state
                    HOLCAL: states['input_text.holidays_calendar_filter']?.state
                    SPOCAL: states['input_text.sports_calendar_filter']?.state
                    MONTH_OFFSET: |
                      (() => {
                        const monthOffset = parseInt(states['input_number.month_view_offset']?.state) || 0;
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const dayOfWeek = today.getDay();
                        
                        // First of target month
                        const firstOfMonth = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
                        
                        // First Sunday of the calendar grid (may be in previous month)
                        const firstSunday = new Date(firstOfMonth);
                        firstSunday.setDate(1 - firstOfMonth.getDay());
                        
                        // Current week's Sunday
                        const currentSunday = new Date(today);
                        currentSunday.setDate(today.getDate() - dayOfWeek);
                        
                        // Weeks between current Sunday and target first Sunday
                        const weeksDiff = Math.round((firstSunday - currentSunday) / (7 * 24 * 60 * 60 * 1000));
                        
                        // Use same pattern as week view
                        return -dayOfWeek + (weeksDiff * 7);
                      })()
                    MONTH_DAYS: |
                      (() => {
                        const monthOffset = parseInt(states['input_number.month_view_offset']?.state) || 0;
                        const today = new Date();
                        const year = today.getFullYear();
                        const month = today.getMonth() + monthOffset;
                        const targetDate = new Date(year, month, 1);
                        const targetYear = targetDate.getFullYear();
                        const targetMonth = targetDate.getMonth();
                        const firstOfMonth = new Date(targetYear, targetMonth, 1);
                        const dayOfWeekOfFirst = firstOfMonth.getDay();
                        const daysInMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
                        const totalCells = Math.ceil((dayOfWeekOfFirst + daysInMonth) / 7) * 7;
                        return totalCells;
                      })()
